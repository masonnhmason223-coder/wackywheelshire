<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wacky Wheels Hire</title>

<style>

/* GLOBAL */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

section {
  padding: 60px 20px;
  text-align: center;
}

/* NAVBAR */
.navbar {
  position: sticky;
  top: 0;
  z-index: 9999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  padding: 15px 25px;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav-links {
  display: flex;
  gap: 20px;
  list-style: none;
}

.nav-links a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

.hamburger {
  display: none;
  font-size: 28px;
  background: none;
  border: none;
  color: white;
}

/* HERO */
.hero {
  height: 80vh;
  background: url('banner.jpeg.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero-content h1 {
  font-size: 45px;
  color: #ffcc00;
}

.cta-btn {
  background: #ffcc00;
  color: black;
  padding: 14px 30px;
  border-radius: 30px;
  font-weight: bold;
  text-decoration: none;
  display: inline-block;
  margin-top: 15px;
}

/* TRUST */
.trust {
  display: flex;
  justify-content: center;
  gap: 30px;
  background: #000;
  padding: 20px;
}

/* VEHICLES */
.vehicles {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 25px;
  max-width: 1100px;
  margin: auto;
}

.card {
  background: #222;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
  transition: 0.3s;
}

.card img:hover {
  transform: scale(1.05);
}

.card h3 {
  color: #ffcc00;
}

.tag {
  background: #ffcc00;
  color: #111;
  padding: 6px 12px;
  border-radius: 20px;
}

/* FORM */
.booking-box {
  background: #222;
  padding: 30px;
  border-radius: 15px;
  max-width: 600px;
  margin: auto;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #ffcc00;
  padding: 14px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
}

/* GALLERY HOVER */
.card img:hover {
  transform: scale(1.08);
}

/* MOBILE */
@media (max-width: 768px) {
  .hamburger { display: block; }

  .nav-links {
    display: none;
    flex-direction: column;
    background: #111;
    position: absolute;
    top: 60px;
    width: 100%;
    left: 0;
    text-align: center;
  }

  .nav-links.show {
    display: flex;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">Wacky Wheels</div>
  <button class="hamburger" onclick="toggleMenu()">☰</button>
  <ul class="nav-links" id="navLinks">
    <li><a href="#home">Home</a></li>
    <li><a href="#vehicles">Vehicles</a></li>
    <li><a href="#book">Book</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Arrive in Style</h1>
    <p>Luxury & unique vehicle hire</p>
    <a href="#book" class="cta-btn">Get a Quote</a>
  </div>
</section>

<!-- TRUST -->
<section class="trust">
  <p>✔ Fully Insured</p>
  <p>✔ DBS Checked</p>
  <p>✔ Reliable Service</p>
</section>

<!-- VEHICLES -->
<section id="vehicles">
  <h2>Our Vehicles</h2>

  <div class="vehicles">
    <div class="card">
      <img src="bug1.jpeg">
      <h3>Bond Bug</h3>
      <span class="tag">Head Turner</span>
    </div>

    <div class="card">
      <img src="vw1.jpeg">
      <h3>VW Camper</h3>
      <span class="tag">Retro</span>
    </div>
  </div>
</section>

<!-- BOOKING -->
<section id="book">
  <div class="booking-box">
    <h2>Booking Enquiry</h2>

    <form>
      <input type="text" placeholder="Name" required>
      <input type="email" placeholder="Email" required>
      <input type="tel" placeholder="Phone" required>

      <select>
        <option>Choose Vehicle</option>
      </select>

      <textarea placeholder="Details"></textarea>

      <button>Send Request</button>
    </form>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <a href="#" class="cta-btn">Message on Facebook</a>
</section>

<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("show");
}
</script>

</body>
</html>
