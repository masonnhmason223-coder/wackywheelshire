<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wacky Wheels Hire</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#050505;
  color:#fff;
  overflow-x:hidden;
}

img{width:100%;display:block;}

:root{
  --gold:#d4af37;
  --gold-dark:#b8962e;
}

/* NAV */
header{
  position:fixed;
  width:100%;
  top:0;
  background:#050505ee;
  z-index:9999;
}

.nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  max-width:1200px;
  margin:auto;
}

.logo span{color:var(--gold);}

.desktop-nav{display:flex;gap:20px;align-items:center;}

.menu-btn{
  display:none;
  font-size:28px;
  background:none;
  color:white;
  border:none;
}

/* MOBILE MENU */
.mobile-menu{
  position:fixed;
  right:-100%;
  top:0;
  width:75%;
  height:100vh;
  background:#050505;
  transition:0.3s;
  padding:80px 20px;
}
.mobile-menu.active{right:0;}

/* BUTTON */
.btn{
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  color:black;
  padding:12px 22px;
  border-radius:30px;
  font-weight:bold;
  display:inline-block;
}

/* HERO */
.hero{
  padding-top:120px;
  text-align:center;
  padding-bottom:60px;
  background:url("banner.jpeg.jpg") center/cover;
}

.hero span{color:var(--gold);}

/* SECTION */
.section{padding:60px 20px;text-align:center;}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.vehicle-card{
  background:#111;
  border-radius:20px;
  overflow:hidden;
}

.vehicle-content{padding:20px;}
.vehicle-content h3{color:var(--gold);}

/* LIGHTBOX */
.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:#000c;
  justify-content:center;
  align-items:center;
}

.lightbox.active{display:flex;}

.lightbox img{
  max-width:90%;
  max-height:80%;
}

.lightbox button{
  position:absolute;
  background:none;
  border:none;
  color:white;
  font-size:40px;
}

/* FLOAT BUTTONS */
.floating-call{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--gold);
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.floating-fb{
  position:fixed;
  bottom:90px;
  right:20px;
  background:#1877f2;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* MOBILE */
@media(max-width:768px){
  .desktop-nav{display:none;}
  .menu-btn{display:block;}
  .cards{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div class="nav">
    <div class="logo">Wacky <span>Wheels</span></div>
    <nav class="desktop-nav">
      <a href="#">Home</a>
      <a href="#vehicles">Vehicles</a>
      <a href="#book">Book</a>
    </nav>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </div>
</header>

<div class="mobile-menu" id="menu">
  <a href="#">Home</a>
  <a href="#vehicles">Vehicles</a>
  <a href="#book">Book</a>
</div>

<section class="hero">
  <h1>Arrive in <span>Style</span></h1>
  <p>Make your entrance unforgettable</p>
  <br>
  <a href="#book" class="btn">Get a Quote</a>
</section>

<section id="vehicles" class="section">
<h2>Our Vehicles</h2>

<div class="cards">

<!-- BUG -->
<div class="vehicle-card" onclick="openGallery(bugImages,0)">
<img src="bug1.jpeg">
<div class="vehicle-content"><h3>Bond Bug</h3></div>
</div>

<!-- VW -->
<div class="vehicle-card" onclick="openGallery(vwImages,0)">
<img src="vw1.jpeg">
<div class="vehicle-content"><h3>VW Camper</h3></div>
</div>

<!-- FIG -->
<div class="vehicle-card" onclick="openGallery(figImages,0)">
<img src="fig1.jpeg">
<div class="vehicle-content"><h3>Nissan Figaro</h3></div>
</div>

<!-- MOKE -->
<div class="vehicle-card" onclick="openGallery(mokeImages,0)">
<img src="moke1.jpeg">
<div class="vehicle-content"><h3>Mini Moke</h3></div>
</div>

<!-- VIP -->
<div class="vehicle-card" onclick="openGallery(vipImages,0)">
<img src="vipshuttle1.jpeg">
<div class="vehicle-content"><h3>VIP Shuttle</h3></div>
</div>

<!-- TROTTERS -->
<div class="vehicle-card" onclick="openGallery(trotterImages,0)">
<img src="trottersvan1.jpeg">
<div class="vehicle-content"><h3>Trotters Van</h3></div>
</div>

<!-- MINI -->
<div class="vehicle-card" onclick="openGallery(miniImages,0)">
<img src="mini1.jpeg">
<div class="vehicle-content"><h3>Classic Mini</h3></div>
</div>

<!-- ESCORT -->
<div class="vehicle-card" onclick="openGallery(escortImages,0)">
<img src="escort1.jpeg">
<div class="vehicle-content"><h3>Ford Escort</h3></div>
</div>

</div>
</section>

<section id="book" class="section">
<h2>Get a Quote</h2>
<form>
<input placeholder="Name">
<input placeholder="Phone">
<textarea placeholder="Details"></textarea>
<button class="btn">Send</button>
</form>
</section>

<a href="https://www.facebook.com/YOURPAGE" class="floating-fb">
<i class="fa-brands fa-facebook-f"></i>
</a>

<a href="tel:01603400400" class="floating-call">
<i class="fa-solid fa-phone"></i>
</a>

<div class="lightbox" id="lightbox">
<button onclick="prev()">‹</button>
<img id="lightboxImg">
<button onclick="next()">›</button>
</div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

/* IMAGE SETS */
const bugImages=[...Array(18).keys()].map(i=>`bug${i+1}.jpeg`);
const vwImages=[...Array(6).keys()].map(i=>`vw${i+1}.jpeg`);
const figImages=[...Array(19).keys()].map(i=>`fig${i+1}.jpeg`);
const mokeImages=[...Array(14).keys()].map(i=>`moke${i+1}.jpeg`);
const vipImages=[...Array(18).keys()].map(i=>`vipshuttle${i+1}.jpeg`);
const trotterImages=[...Array(13).keys()].map(i=>`trottersvan${i+1}.jpeg`);
const miniImages=["mini1.jpeg"];
const escortImages=["escort1.jpeg"];

let currentSet=[],index=0;

function openGallery(set,i){
  currentSet=set;
  index=i;
  show();
  document.getElementById("lightbox").classList.add("active");
}

function show(){
  document.getElementById("lightboxImg").src=currentSet[index];
}

function next(){
  index=(index+1)%currentSet.length;
  show();
}

function prev(){
  index=(index-1+currentSet.length)%currentSet.length;
  show();
}

document.getElementById("lightbox").onclick=(e)=>{
  if(e.target.id==="lightbox"){
    e.currentTarget.classList.remove("active");
  }
}
</script>

</body>
</html>
