<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wacky Wheels Hire</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

header {
  text-align:center;
  padding:40px;
  background:#000;
}

header h1 {
  color:#ffcc00;
}

nav {
  text-align:center;
  background:#222;
  padding:10px;
}

nav a {
  color:white;
  margin:10px;
  text-decoration:none;
  font-weight:bold;
}

section {
  padding:40px;
  text-align:center;
}

.vehicles {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card {
  background:#222;
  border-radius:10px;
  width:260px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
  cursor:pointer;
}

.card h3 {
  color:#ffcc00;
}

.gallery {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  overflow:auto;
  padding-top:60px;
  z-index:999;
}

.gallery img {
  width:300px;
  margin:10px;
  border-radius:10px;
}

.close {
  position:fixed;
  top:20px;
  right:30px;
  font-size:40px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>🚘 Wacky Wheels Hire</h1>
  <p>Proms • Weddings • Special Events</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Vehicles</a>
  <a href="#">Book</a>
</nav>

<section>
  <h2>Make Your Entrance Unforgettable</h2>
  <p>Stand out at your prom or event with something different.</p>
</section>

<section>
  <h2>Our Vehicles</h2>

  <div class="vehicles">

    <!-- BOND BUG -->
    <div class="card">
     <img src="bug1.jpeg" onclick="openGallery()">
      <h3>Bond Bug</h3>
      <p>Something completely different. Guaranteed attention.</p>
    </div>

  </div>
</section>

<!-- GALLERY -->
<div id="gallery" class="gallery">
  <span class="close" onclick="closeGallery()">&times;</span>

  <div style="text-align:center;">
    <img src="bug1.jpeg">
<img src="bug2.jpeg">
<img src="bug3.jpeg">
<img src="bug4.jpeg">
<img src="bug5.jpeg">
<img src="bug6.jpeg">
<img src="bug7.jpeg">
<img src="bug8.jpeg">
<img src="bug9.jpeg">
<img src="bug10.jpeg">
<img src="bug11.jpeg">
<img src="bug12.jpeg">
<img src="bug13.jpeg">
<img src="bug14.jpeg">
<img src="bug15.jpeg">
<img src="bug16.jpeg">
<img src="bug17.jpeg">
<img src="bug18.jpeg">
  </div>
</div>

<script>
function openGallery() {
  document.getElementById("gallery").style.display = "block";
}

function closeGallery() {
  document.getElementById("gallery").style.display = "none";
}
</script>

</body>
</html>
