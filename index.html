<!DOCTYPE html>
<html>
<head>
  <title>Wacky Wheels</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 { color: #ffcc00; }
    form {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: none;
    }
    button {
      background: #ffcc00;
      padding: 10px;
      width: 100%;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🚘 Wacky Wheels</h1>
<p>Proms • Events • Special Occasions</p>

<h2>Book Now</h2>

<form>
  <input type="text" placeholder="Your Name" required>
  <input type="email" placeholder="Your Email" required>
  <input type="text" placeholder="Event Date" required>
  <input type="text" placeholder="Pickup Location" required>
  <textarea placeholder="Extra details..."></textarea>
  <button type="submit">Send Booking Request</button>
</form>

</body>
</html>
