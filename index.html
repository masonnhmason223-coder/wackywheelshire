<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wacky Wheels Hire</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

header {
  text-align:center;
  padding:40px;
  background:#000;
}

header h1 {
  color:#ffcc00;
}

nav {
  text-align:center;
  background:#222;
  padding:10px;
}

nav a {
  color:white;
  margin:10px;
  text-decoration:none;
  font-weight:bold;
}

section {
  padding:40px;
  text-align:center;
}

.vehicles {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card {
  background:#222;
  border-radius:10px;
  width:260px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
  cursor:pointer;
}

.card h3 {
  color:#ffcc00;
}

.gallery {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  overflow:auto;
  padding-top:60px;
  z-index:999;
}

.gallery img {
  width:300px;
  margin:10px;
  border-radius:10px;
}

.close {
  position:fixed;
  top:20px;
  right:30px;
  font-size:40px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>🚘 Wacky Wheels Hire</h1>
  <p>Proms • Weddings • Special Events</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Vehicles</a>
  <a href="#">Book</a>
</nav>

<section>
  <h2>Make Your Entrance Unforgettable</h2>
  <p>Stand out at your prom or event with something different.</p>
</section>

<section>
  <h2>Our Vehicles</h2>

  <div class="vehicles">

    <!-- BOND BUG -->
    <div class="card">
    <img src="bug1.jpeg" onclick="openGallery()">
      <h3>Bond Bug</h3>
      <p>Something completely different. Guaranteed attention.</p>
    </div>

  </div>
</section>

<!-- GALLERY -->
<div id="gallery" class="gallery">
  <span class="close" onclick="closeGallery()">&times;</span>

  <div id="gallery" class="gallery">
  <span class="close" onclick="closeGallery()">&times;</span>

  <button onclick="changeImage(-1)" class="arrow left">&#10094;</button>

  <img id="mainImage" src="bug1.jpeg" style="max-width:90%; max-height:80%; border-radius:10px;">

  <button onclick="changeImage(1)" class="arrow right">&#10095;</button>

  <p id="counter">1 / 18</p>
</div>

<script>
let currentImage = 1;
const totalImages = 18;

function openGallery() {
  currentImage = 1;
  updateGallery();
  document.getElementById("gallery").style.display = "flex";
}

function closeGallery() {
  document.getElementById("gallery").style.display = "none";
}

function changeImage(direction) {
  currentImage += direction;

  if (currentImage < 1) currentImage = totalImages;
  if (currentImage > totalImages) currentImage = 1;

  updateGallery();
}

function updateGallery() {
  document.getElementById("mainImage").src = "bug" + currentImage + ".jpeg";
  document.getElementById("counter").innerText = currentImage + " / " + totalImages;
}
  let startX = 0;

document.getElementById("mainImage").addEventListener("touchstart", function(e) {
  startX = e.touches[0].clientX;
});

document.getElementById("mainImage").addEventListener("touchend", function(e) {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) {
    changeImage(1);
  } else if (endX - startX > 50) {
    changeImage(-1);
  }
});

document.addEventListener("keydown", function(e) {
  if (document.getElementById("gallery").style.display === "flex") {
    if (e.key === "ArrowRight") changeImage(1);
    if (e.key === "ArrowLeft") changeImage(-1);
    if (e.key === "Escape") closeGallery();
  }
});
</script>

</body>
</html>
