<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wacky Wheels Hire</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  font-family: Arial, sans-serif;
  background: #050505;
  color: #fff;
}

img {
  max-width: 100%;
  height: auto;
}

:root {
  --gold: #d4af37;
  --gold-dark: #b8962e;
}

/* NAV */
header {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(5,5,5,0.9);
  backdrop-filter: blur(10px);
  z-index: 9999;
}

.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  max-width: 1200px;
  margin: auto;
}

.logo span {
  color: var(--gold);
}

.desktop-nav {
  display: flex;
  gap: 20px;
  align-items: center;
}

.menu-btn {
  display: none;
  font-size: 28px;
  background: none;
  color: white;
  border: none;
}

/* MOBILE MENU */
.mobile-menu {
  position: fixed;
  right: -100%;
  top: 0;
  width: 75%;
  height: 100vh;
  background: #050505;
  transition: 0.3s;
  padding: 80px 20px;
}

.mobile-menu.active {
  right: 0;
}

.mobile-menu a {
  display: block;
  margin-bottom: 20px;
  font-size: 20px;
}

/* BUTTONS */
.btn {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: black;
  padding: 12px 22px;
  border-radius: 30px;
  font-weight: bold;
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: "";
  position: absolute;
  left: -75%;
  width: 50%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
}

.btn:hover::before {
  animation: shine 0.8s forwards;
}

@keyframes shine {
  100% { left: 125%; }
}

/* HERO */
.hero {
  padding-top: 120px;
  text-align: center;
  padding-bottom: 60px;
}

.hero h1 span {
  color: var(--gold);
}

/* SECTIONS */
.section {
  padding: 60px 20px;
  text-align: center;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.vehicle-card {
  background: #111;
  border-radius: 20px;
  overflow: hidden;
}

.vehicle-card img {
  height: 250px;
  object-fit: cover;
  width: 100%;
  transition: 0.3s;
}

.vehicle-card:hover img {
  transform: scale(1.05);
}

/* FORM */
form {
  max-width: 600px;
  margin: auto;
}

input, textarea, select {
  width: 100%;
  margin-bottom: 10px;
  padding: 12px;
  background: #000;
  border: 1px solid #333;
  color: white;
}

/* FLOAT BUTTONS */
.floating-call {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--gold);
  color: black;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.floating-fb {
  position: fixed;
  bottom: 90px;
  right: 20px;
  background: #1877f2;
  color: white;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

/* MOBILE */
@media(max-width:768px){
  .desktop-nav { display:none; }
  .menu-btn { display:block; }
  .cards { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<header>
  <div class="nav">
    <div class="logo">Wacky <span>Wheels</span></div>
    <nav class="desktop-nav">
      <a href="#">Home</a>
      <a href="#vehicles">Vehicles</a>
      <a href="#book">Book</a>
    </nav>
    <button class="menu-btn" onclick="openMenu()">☰</button>
  </div>
</header>

<div class="mobile-menu" id="menu">
  <a href="#">Home</a>
  <a href="#vehicles">Vehicles</a>
  <a href="#book">Book</a>
</div>

<section class="hero">
  <h1>Arrive in <span>Style</span></h1>
  <p>Make your entrance unforgettable</p>
  <br>
  <a href="#book" class="btn">Get a Quote</a>
</section>

<section id="vehicles" class="section">
  <h2>Our Vehicles</h2>

  <div class="cards">
    <div class="vehicle-card">
      <img src="images/bond-bug.jpg">
      <div class="section">
        <h3>Bond Bug</h3>
      </div>
    </div>

    <div class="vehicle-card">
      <img src="images/vw-camper.jpg">
      <div class="section">
        <h3>VW Camper</h3>
      </div>
    </div>
  </div>
</section>

<section id="book" class="section">
  <h2>Get a Quote</h2>

  <form>
    <input placeholder="Name">
    <input placeholder="Phone">
    <textarea placeholder="Details"></textarea>
    <button class="btn">Send</button>
  </form>

  <br><br>

  <!-- FACEBOOK BUTTON -->
  <a href="https://www.facebook.com/YOURPAGE" target="_blank" class="btn">
    💬 Message us on Facebook
  </a>

</section>

<!-- FLOATING BUTTONS -->
<a href="tel:01603400400" class="floating-call">📞</a>
<a href="https://www.facebook.com/YOURPAGE" target="_blank" class="floating-fb">💬</a>

<script>
function openMenu(){
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
